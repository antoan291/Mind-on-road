services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindonroad-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mindonroad:mindonroad@postgres:5432/mindonroad
      DIRECT_DATABASE_URL: postgresql://mindonroad:mindonroad@postgres:5432/mindonroad
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: mindonroad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindonroad
      POSTGRES_USER: mindonroad
      POSTGRES_PASSWORD: mindonroad
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindonroad -d mindonroad"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindonroad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mindonroad-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:

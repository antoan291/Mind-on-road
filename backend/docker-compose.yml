services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindonroad-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      DOCUMENT_OCR_SOURCE_DIR: /automation-samples
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      DOCUMENT_OCR_WORKER_URL: http://ocr-worker:8080
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ../automation/samples:/automation-samples:ro
      - ../automation/output:/automation-output:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      ocr-worker:
        condition: service_healthy

  ocr-worker:
    build:
      context: ../automation
      dockerfile: Dockerfile
    container_name: mindonroad-ocr-worker
    restart: unless-stopped
    environment:
      DOCUMENT_OCR_SOURCE_DIR: /automation-samples
      DOCUMENT_OCR_OUTPUT_DIR: /automation-output
      DOCUMENT_OCR_WORKER_PORT: 8080
      PADDLEOCR_LANGUAGE: cyrillic
    volumes:
      - ../automation/samples:/automation-samples:ro
      - ../automation/output:/automation-output
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: mindonroad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindonroad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mindonroad-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
